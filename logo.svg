<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#2c5f8a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="200" cy="200" r="195" fill="#1a1a2e" stroke="#4a90d9" stroke-width="3"/>

  <!-- 盾牌（Aegis） -->
  <path d="M200 70 L290 120 L290 210 Q290 300 200 340 Q110 300 110 210 L110 120 Z"
        fill="url(#shield)" stroke="#6ab0ff" stroke-width="2.5" opacity="0.9"/>

  <!-- 盾牌上的 L 字母 -->
  <text x="200" y="225" font-family="Georgia, serif" font-size="100"
        font-weight="bold" fill="#ffffff" text-anchor="middle"
        dominant-baseline="middle">L</text>

  <!-- 锁链环（上） -->
  <ellipse cx="200" cy="48" rx="30" ry="14" fill="none" stroke="url(#ring)" stroke-width="4"/>
  <ellipse cx="200" cy="48" rx="30" ry="14" fill="none" stroke="#c0c0c0" stroke-width="2"/>

  <!-- 锁链 - 右上 -->
  <ellipse cx="320" cy="120" rx="18" ry="10" fill="none" stroke="#a0a0a0" stroke-width="3"
           transform="rotate(40 320 120)"/>
  <ellipse cx="355" cy="155" rx="18" ry="10" fill="none" stroke="#a0a0a0" stroke-width="3"
           transform="rotate(55 355 155)"/>

  <!-- 锁链 - 左上 -->
  <ellipse cx="80" cy="120" rx="18" ry="10" fill="none" stroke="#a0a0a0" stroke-width="3"
           transform="rotate(-40 80 120)"/>
  <ellipse cx="45" cy="155" rx="18" ry="10" fill="none" stroke="#a0a0a0" stroke-width="3"
           transform="rotate(-55 45 155)"/>

  <!-- 底部文字 -->
  <text x="200" y="382" font-family="Georgia, serif" font-size="24"
        fill="#8ab4f8" text-anchor="middle" letter-spacing="5">Leash</text>
</svg>
