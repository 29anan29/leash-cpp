<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
    <linearGradient id="tagGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#2c5f8a"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="200" cy="200" r="195" fill="#1a1a2e" stroke="#4a90d9" stroke-width="2"/>

  <!-- 主锁链环（大） -->
  <ellipse cx="200" cy="120" rx="65" ry="28" fill="none" stroke="url(#ringGrad)" stroke-width="5"/>
  <ellipse cx="200" cy="120" rx="65" ry="28" fill="none" stroke="#bbb" stroke-width="2.5"/>

  <!-- 锁链：左链节 -->
  <ellipse cx="115" cy="145" rx="22" ry="12" fill="none" stroke="#999" stroke-width="4"
           transform="rotate(-30 115 145)"/>
  <!-- 锁链：右链节 -->
  <ellipse cx="285" cy="145" rx="22" ry="12" fill="none" stroke="#999" stroke-width="4"
           transform="rotate(30 285 145)"/>

  <!-- 左链往下 -->
  <ellipse cx="85" cy="190" rx="20" ry="11" fill="none" stroke="#999" stroke-width="4"
           transform="rotate(-50 85 190)"/>
  <!-- 右链往下 -->
  <ellipse cx="315" cy="190" rx="20" ry="11" fill="none" stroke="#999" stroke-width="4"
           transform="rotate(50 315 190)"/>

  <!-- 标签牌（dog tag） -->
  <rect x="140" y="200" width="120" height="100" rx="15" ry="15"
        fill="url(#tagGrad)" stroke="#6ab0ff" stroke-width="2.5"/>
  <!-- 标签牌上的小孔（穿链） -->
  <circle cx="200" cy="215" r="6" fill="#1a1a2e" stroke="#6ab0ff" stroke-width="1.5"/>

  <!-- L 字母 -->
  <text x="200" y="268" font-family="Georgia, serif" font-size="60"
        font-weight="bold" fill="#ffffff" text-anchor="middle"
        dominant-baseline="middle">L</text>

  <!-- 底部文字 -->
  <text x="200" y="375" font-family="Georgia, serif" font-size="20"
        fill="#8ab4f8" text-anchor="middle" letter-spacing="6">Leash</text>
</svg>
